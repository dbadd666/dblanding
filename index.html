<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experience</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay" id="loader">
  <div class="loader-box">
    <p>Loading experience...</p>
    <div class="progress"></div>
  </div>
</div>

<div class="container">
    <h1 class="title glow">New Online Experience 🎯</h1>
    <p class="subtitle">Fun & Entertainment Platform</p>

    <div class="countdown" id="countdown">05</div>

    <a href="https://dhakabaji.org" class="btn">Join Now</a>
</div>

<script>
let time = 5;
let countdown = document.getElementById("countdown");

let interval = setInterval(()=>{
  time--;
  countdown.innerText = "0" + time;
  if(time <= 0){
    clearInterval(interval);
    window.location.href = "https://dhakabaji.org";
  }
},1000);

setTimeout(()=>{
  document.getElementById("loader").style.display="none";
},2000);
</script>

</body>
</html>
