<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusive Experience</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Glow animation */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,106,0,0.2) 0%, transparent 60%);
  animation: move 6s infinite linear;
}

@keyframes move {
  0% {transform: translate(-10%, -10%);}
  50% {transform: translate(10%, 10%);}
  100% {transform: translate(-10%, -10%);}
}

.container {
  text-align: center;
  z-index: 2;
  max-width: 400px;
  padding: 20px;
}

.title {
  font-size: 2.2rem;
  color: #ff6a00;
  text-shadow: 0 0 10px #ff6a00, 0 0 30px #ff6a00;
}

.subtitle {
  margin-top: 10px;
  opacity: 0.8;
}

.badge {
  background: rgba(255,106,0,0.2);
  display: inline-block;
  padding: 8px 15px;
  border-radius: 20px;
  margin-bottom: 15px;
  font-size: 14px;
}

/* 🔥 Center block */
.center-box {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Countdown */
.countdown {
  font-size: 32px;
  color: #ffb347;
  margin-bottom: 15px;
  font-weight: bold;
}

/* Button */
.btn {
  padding: 15px 35px;
  font-size: 18px;
  background: linear-gradient(45deg, #ff6a00, #ffb347);
  color: black;
  border-radius: 40px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 0 15px #ff6a00;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ff6a00;
}
</style>

<!-- Meta Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}
(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '1514808416887629');
fbq('track', 'PageView');
</script>

</head>

<body>

<div class="container">

  <div class="badge">🔥 Limited Access</div>

  <h1 class="title">New Online Experience 🎯</h1>
  <p class="subtitle">Premium Entertainment Platform</p>

  <!-- 🔥 Center section -->
  <div class="center-box">
    <div class="countdown" id="countdown">03</div>

    <a href="https://dhakabaji.org" class="btn"
       onclick="fbq('track', 'Lead');">
       Join Now
    </a>
  </div>

</div>

<script>
let time = 3;
let countdown = document.getElementById("countdown");

let interval = setInterval(()=>{
  time--;
  countdown.innerText = "0" + time;

  if(time <= 0){
    clearInterval(interval);

    fbq('track', 'Lead');
    window.location.href = "https://dhakabaji.org";
  }
},1000);
</script>

</body>
</html>
