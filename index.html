<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experience</title>
<link rel="stylesheet" href="style.css">

<!-- Meta Pixel Code -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}
(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '1514808416887629');
fbq('track', 'PageView');
</script>

<noscript>
<img height="1" width="1"
src="https://www.facebook.com/tr?id=1514808416887629&ev=PageView&noscript=1"/>
</noscript>
<!-- End Meta Pixel Code -->

</head>
<body>

<div class="overlay" id="loader">
  <div class="loader-box">
    <p>Loading experience...</p>
    <div class="progress"></div>
  </div>
</div>

<div class="container">
    <h1 class="title glow">New Online Experience 🎯</h1>
    <p class="subtitle">Fun & Entertainment Platform</p>

    <div class="countdown" id="countdown">05</div>

    <!-- Button with Lead Tracking -->
    <a href="https://dhakabaji.org" class="btn"
       onclick="fbq('track', 'Lead');">
       Join Now
    </a>
</div>

<script>
let time = 5;
let countdown = document.getElementById("countdown");

let interval = setInterval(()=>{
  time--;
  countdown.innerText = "0" + time;

  if(time <= 0){
    clearInterval(interval);

    // Track Lead before redirect
    fbq('track', 'Lead');

    window.location.href = "https://dhakabaji.org";
  }
},1000);

setTimeout(()=>{
  document.getElementById("loader").style.display="none";
},2000);
</script>

</body>
</html>
